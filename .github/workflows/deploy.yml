name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            # 1. Sync the code
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            # 2. Activate the Server's Virtual Environment
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            
            # 3. Install build tools into the virtualenv BINARY path
            # This makes the 'nest' command available directly in the shell
            npm install -g @nestjs/cli typescript @types/node
            
            # 4. Build the project
            # Since the environment is activated and tools are installed 'globally' 
            # within the virtualenv, we can just call 'nest'
            nest build
            
            # 5. Finalize and Restart
            mkdir -p tmp
            touch tmp/restart.txt