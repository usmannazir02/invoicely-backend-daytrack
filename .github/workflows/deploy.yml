name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Local Build Check
        run: |
          npm install
          npm run build

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            # 1. Activate the Virtual Environment
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            
            # 2. Use the cPanel-friendly way to install dependencies
            # This ensures they go into the virtual environment instead of a local folder
            npm install --include=dev
            
            # 3. Use 'npx' to find the nest binary
            # Since 'node_modules' is a symlink, npx is more reliable for finding binaries
            npx nest build
            
            # 4. Cleanup and Restart
            npm prune --production
            mkdir -p tmp
            touch tmp/restart.txt