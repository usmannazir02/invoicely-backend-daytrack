name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            # 1. Sync the code
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            # 2. ACTIVATE the Virtual Environment FIRST
            # npm will be "command not found" until this line runs
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            
            # 3. Install project dependencies (including cookie-parser)
            # This fixes the "Cannot find module 'cookie-parser'" error
            npm install
            npm install cookie-parser @types/cookie-parser
            
            # 4. Install build tools into the virtualenv binary path
            npm install -g @nestjs/cli typescript @types/node
            
            # 5. Build the project
            nest build
            
            # 6. Finalize and Restart
            mkdir -p tmp
            touch tmp/restart.txt