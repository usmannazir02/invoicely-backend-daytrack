name: Deploy Daytrack via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            # 1. Navigate to the NEW project directory
            cd /home/sigmolabs/invoicely-backend-daytrack
            
            # If git isn't initialized yet in this folder, you may need to clone first 
            # or ensure the folder is a git repo. Assuming it is already linked:
            git fetch origin
            git reset --hard origin/main
            
            # 2. Activate the specific Virtual Env for this project
            # Note: Check the path in "Setup Node.js App" as it might differ slightly
            source /home/sigmolabs/nodevenv/invoicely-backend-daytrack/20/bin/activate
            
            # 3. Install dependencies
            npm install
            
            # 4. Install Nest CLI (locally or globally within the venv)
            npm install -g @nestjs/cli
            
            # 5. Build
            nest build
            
            # 6. Restart the Node application
            mkdir -p tmp
            touch tmp/restart.txt