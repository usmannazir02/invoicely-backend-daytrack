name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            # 1. Sync the code
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            # 2. Activate the Server's Virtual Environment
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            
            # 3. Install build tools into the virtualenv to avoid root conflicts
            # This satisfies the CloudLinux demand by not touching the 'node_modules' symlink
            npm install --prefix /home/sigmolabs/nodevenv/invoicely-backend/20 @nestjs/cli typescript @types/node
            
            # 4. Build using the ABSOLUTE path to the Nest binary
            # This ensures 'nest build' runs even if the command isn't in your local path
            /home/sigmolabs/nodevenv/invoicely-backend/20/bin/nest build
            
            # 5. Finalize and Restart
            mkdir -p tmp
            touch tmp/restart.txt