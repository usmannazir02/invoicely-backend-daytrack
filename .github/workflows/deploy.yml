name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Project Locally
        run: |
          npm install
          npm run build

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203 
          username: sigmolabs    
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            npm install --production
            # Critical: Rebuild the project on the server to update the /dist folder
            npm run build
            # Ensure tmp directory exists and trigger restart
            mkdir -p tmp
            touch tmp/restart.txt