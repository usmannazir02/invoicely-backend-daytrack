name: Deploy via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Local Build Check
        run: |
          npm install
          npm run build

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 198.187.31.203
          username: sigmolabs
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            cd /home/sigmolabs/invoicely-backend
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            # Activate the specific Node.js virtual environment for this app
            source /home/sigmolabs/nodevenv/invoicely-backend/20/bin/activate
            
            # Install all dependencies (including dev) to ensure build tools are present
            npm install --include=dev
            
            # Use the local project binary to build, bypassing the "command not found" error
            ./node_modules/.bin/nest build
            
            # Remove dev dependencies to keep the production environment clean
            npm prune --production
            
            # Create the restart trigger directory and file
            mkdir -p tmp
            touch tmp/restart.txt